version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=secret
      - DB_NAME=fashion_designer
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=fashion_designer
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initialize the database using the existing schema
      - ./fashion-designer/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:
